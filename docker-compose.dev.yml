services:
  app:
    image: golang:1.26
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    ports:
      - "3500:8080"
    environment:
      PORT: 8080
      DB_URL: ${DB_URL}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN}
      LOG_LEVEL: debug
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends lsof &&
             go install github.com/air-verse/air@latest && air"

volumes:
  go-mod-cache:
