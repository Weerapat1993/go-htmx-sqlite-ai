services:
  migrate:
    image: golang:1.26
    working_dir: /app
    volumes:
      - .:/app:ro
    entrypoint: ["sh", "-c"]
    command:
      - '/app/migrate.sh -p libsql -u "$${DB_URL#libsql://}" -t "$$TURSO_AUTH_TOKEN"'
    environment:
      DB_URL: ${DB_URL}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN}

  app:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      LOG_LEVEL: info
      LOG_OUTPUT: text
      DB_URL: ${DB_URL}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN}
      RATE_LIMIT: 50
    restart: unless-stopped
